spring:
  application:
    name: review-api
  datasource:
    url: jdbc:oracle:thin:@//${ORACLE_HOST:localhost}:${ORACLE_PORT:1521}/${ORACLE_SERVICE:FREEPDB1}
    username: ${ORACLE_USERNAME:review_app}
    password: ${ORACLE_PASSWORD:ReviewApp12345}
    driver-class-name: oracle.jdbc.OracleDriver

server:
  port: 8080

review:
  jwt:
    secret: ${REVIEW_JWT_SECRET:ReviewJwtSecretKeyForLocalDevOnly12345}
    issuer: ${REVIEW_JWT_ISSUER:review-api}
    expiration: ${REVIEW_JWT_EXPIRATION:PT24H}
