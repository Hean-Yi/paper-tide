spring:
  application:
    name: review-api
  datasource:
    url: jdbc:oracle:thin:@//${ORACLE_HOST:localhost}:${ORACLE_PORT:1521}/${ORACLE_SERVICE:FREEPDB1}
    username: ${ORACLE_USERNAME:review_app}
    password: ${ORACLE_PASSWORD:ReviewApp12345}
    driver-class-name: oracle.jdbc.OracleDriver

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: always

review:
  jwt:
    secret: ${REVIEW_JWT_SECRET:ReviewJwtSecretKeyForLocalDevOnly12345}
    issuer: ${REVIEW_JWT_ISSUER:review-api}
    expiration: ${REVIEW_JWT_EXPIRATION:PT24H}
  agent:
    base-url: ${AGENT_SERVICE_BASE_URL:http://localhost:8001}
    internal-api-key: ${AGENT_INTERNAL_API_KEY:local-dev-internal-key}
    timeout-seconds: ${AGENT_TIMEOUT_SECONDS:30}
    polling-timeout-minutes: ${AGENT_POLLING_TIMEOUT_MINUTES:10}
    polling-delay-ms: ${AGENT_POLLING_DELAY_MS:5000}
